name = "ewdev/lute_std_lint"
version = "0.1.0"
description = "A Lute lint rule to check for disallowed standard library references"
authors = ["EwDev (https://ewdev.net/)"]
repository = "https://github.com/ewd3v/lute_std_lint"
license = "MIT"
includes = ["pesde.toml", "README.md", "LICENSE", "src/**/*.luau"]

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"
