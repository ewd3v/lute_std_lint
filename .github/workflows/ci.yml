name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

env:
  MISE_ENV: "ci"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Mise
        uses: jdx/mise-action@v4

      - uses: ./.github/actions/install_dependencies
      
      - name: Run linting tasks
        run: mise run --jobs 1 --continue-on-error lint
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Mise
        uses: jdx/mise-action@v4

      - uses: ./.github/actions/install_dependencies
      
      - name: Run tests
        run: mise run test
